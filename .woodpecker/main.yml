pipeline:
  dryrun:
    image: plugins/docker
    settings:
      repo: woodpeckerci/plugin-docker-buildx
      tags: latest
      dockerfile: Dockerfile
      dryrun: true
    when:
      event: pull_request

  publish:
    image: plugins/kaniko
    settings:
      repo: woodpeckerci/plugin-docker-buildx
      tags: latest
      dockerfile: Dockerfile
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      event: [push, tag]
      branch: main+